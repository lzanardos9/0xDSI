name: fortinet_fortigate
version: "1.3.0"
vendor: Fortinet
category: network_security
description: FortiGate firewall via syslog (key=value format)

input:
  type: syslog
  protocol: tcp
  port: 514
  format: kv

auth:
  type: none

parser:
  engine: kv_pairs
  delimiter: " "
  timestamp_field: date
  timestamp_format: "2006-01-02 15:04:05"
  severity_map:
    emergency: critical
    alert: critical
    critical: critical
    error: high
    warning: medium
    notice: low
    information: info

ocsf_mapping:
  event_class: 4001
  fields:
    src_endpoint.ip: srcip
    dst_endpoint.ip: dstip
    dst_endpoint.port: dstport
    activity_name: action
    actor.user.name: user
    network.protocol: proto
    network.bytes: sentbyte

output:
  buffer_size: 10000
  flush_interval: "5s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 40000
  disk_buffer_mb: 500
