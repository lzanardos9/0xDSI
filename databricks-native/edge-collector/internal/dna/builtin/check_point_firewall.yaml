name: check_point_firewall
version: "1.3.0"
vendor: Check Point
category: network_firewall
description: Check Point NGFW logs via OPSEC LEA / Log Exporter

input:
  type: syslog
  protocol: tcp
  port: 514
  format: cef

auth:
  type: certificate
  cert_env: CHECKPOINT_CERT_PATH

parser:
  engine: cef
  timestamp_field: rt

ocsf_mapping:
  event_class: 4001
  fields:
    src_endpoint.ip: src
    src_endpoint.port: spt
    dst_endpoint.ip: dst
    dst_endpoint.port: dpt
    network.protocol: proto
    metadata.product.name: deviceProduct
    metadata.product.vendor_name: deviceVendor
    connection_info.direction: deviceDirection

output:
  buffer_size: 8000
  flush_interval: "5s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 40000
  disk_buffer_mb: 500
