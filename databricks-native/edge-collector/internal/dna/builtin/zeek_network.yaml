name: zeek_network
version: "1.3.0"
vendor: Open Source (Zeek Project)
category: network_monitoring
description: Zeek (formerly Bro) network analysis logs via JSON log output

input:
  type: file_tail
  protocol: file
  port: 0
  format: zeek_json
  file_path: /opt/zeek/logs/current/

auth:
  type: none

parser:
  engine: json_path
  timestamp_field: ts
  json_paths:
    uid: uid
    src_ip: id.orig_h
    src_port: id.orig_p
    dst_ip: id.resp_h
    dst_port: id.resp_p
    proto: proto
    service: service
    duration: duration
    orig_bytes: orig_bytes
    resp_bytes: resp_bytes
    conn_state: conn_state

ocsf_mapping:
  event_class: 4001
  fields:
    src_endpoint.ip: src_ip
    src_endpoint.port: src_port
    dst_endpoint.ip: dst_ip
    dst_endpoint.port: dst_port
    network.protocol: proto
    network.application: service
    network.bytes: orig_bytes
    connection_info.uid: uid

output:
  buffer_size: 15000
  flush_interval: "3s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 150000
  disk_buffer_mb: 2000
