name: gcp_audit_log
version: "1.6.0"
vendor: Google Cloud
category: cloud
description: Google Cloud Platform audit logs via Pub/Sub subscription

input:
  type: api_stream
  protocol: https
  port: 443
  format: json

auth:
  type: oauth2
  key_env: GCP_SERVICE_ACCOUNT_JSON

parser:
  engine: json_path
  timestamp_field: timestamp
  json_paths:
    method_name: protoPayload.methodName
    service_name: protoPayload.serviceName
    resource_name: protoPayload.resourceName
    principal_email: protoPayload.authenticationInfo.principalEmail
    caller_ip: protoPayload.requestMetadata.callerIp
    status_code: protoPayload.status.code
    project_id: resource.labels.project_id
    severity: severity

ocsf_mapping:
  event_class: 6003
  fields:
    api.operation: method_name
    api.service.name: service_name
    actor.user.email_addr: principal_email
    src_endpoint.ip: caller_ip
    api.response.code: status_code
    cloud.account.uid: project_id
    metadata.product.name: "'Google Cloud'"

output:
  buffer_size: 5000
  flush_interval: "5s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 15000
  disk_buffer_mb: 500
