name: okta_system_log
version: "2.1.0"
vendor: Okta
category: identity
description: Okta System Log events via REST API polling

input:
  type: api_poll
  protocol: https
  port: 443
  format: json
  poll_interval: "15s"

auth:
  type: api_key
  key_env: OKTA_API_TOKEN

parser:
  engine: json_path
  timestamp_field: published
  json_paths:
    event_type: eventType
    display_message: displayMessage
    actor_email: actor.alternateId
    actor_display: actor.displayName
    client_ip: client.ipAddress
    client_geo: client.geographicalContext.city
    client_device: client.device
    client_os: client.userAgent.os
    target_email: target[0].alternateId
    target_type: target[0].type
    outcome: outcome.result
    reason: outcome.reason

ocsf_mapping:
  event_class: 3002
  fields:
    actor.user.email_addr: actor_email
    actor.user.name: actor_display
    src_endpoint.ip: client_ip
    src_endpoint.location.city: client_geo
    api.operation: event_type
    api.response.message: display_message
    status: outcome

output:
  buffer_size: 3000
  flush_interval: "10s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 5000
  disk_buffer_mb: 300
