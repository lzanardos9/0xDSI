name: suricata_ids
version: "1.2.0"
vendor: Open Source (OISF)
category: ids_ips
description: Suricata IDS/IPS EVE JSON log via file tail or syslog

input:
  type: file_tail
  protocol: file
  port: 0
  format: eve_json
  file_path: /var/log/suricata/eve.json

auth:
  type: none

parser:
  engine: json_path
  timestamp_field: timestamp
  json_paths:
    event_type: event_type
    src_ip: src_ip
    src_port: src_port
    dst_ip: dest_ip
    dst_port: dest_port
    proto: proto
    alert_signature: alert.signature
    alert_severity: alert.severity
    alert_category: alert.category
    sid: alert.signature_id
    flow_id: flow_id

ocsf_mapping:
  event_class: 4002
  fields:
    src_endpoint.ip: src_ip
    src_endpoint.port: src_port
    dst_endpoint.ip: dst_ip
    dst_endpoint.port: dst_port
    network.protocol: proto
    finding.title: alert_signature
    finding.uid: sid
    severity: alert_severity

output:
  buffer_size: 10000
  flush_interval: "3s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 100000
  disk_buffer_mb: 1000
