name: cisco_asa
version: "1.5.0"
vendor: Cisco
category: network_security
description: Cisco ASA/Firepower via syslog

input:
  type: syslog
  protocol: udp
  port: 1514
  format: cisco_syslog

auth:
  type: none

parser:
  engine: regex
  regex: '%ASA-(?P<severity>\d)-(?P<message_id>\d+):\s*(?P<message>.*)'
  timestamp_field: timestamp
  severity_map:
    "1": critical
    "2": critical
    "3": high
    "4": high
    "5": medium
    "6": low
    "7": info

ocsf_mapping:
  event_class: 4001
  fields:
    src_endpoint.ip: src_ip
    dst_endpoint.ip: dst_ip
    dst_endpoint.port: dst_port
    activity_name: action
    actor.user.name: user

output:
  buffer_size: 10000
  flush_interval: "5s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 30000
  disk_buffer_mb: 500
