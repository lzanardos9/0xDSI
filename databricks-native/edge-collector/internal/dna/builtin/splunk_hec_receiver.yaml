name: splunk_hec_receiver
version: "1.2.0"
vendor: Splunk
category: siem_integration
description: Receive events from Splunk HEC forwarders (HTTP Event Collector protocol)

input:
  type: http_listener
  protocol: https
  port: 8088
  format: splunk_hec
  tls_enabled: true

auth:
  type: api_key
  key_env: SPLUNK_HEC_TOKEN

parser:
  engine: splunk_hec
  timestamp_field: time

ocsf_mapping:
  event_class: 6003
  fields:
    message: event
    metadata.product.name: sourcetype
    device.hostname: host

output:
  buffer_size: 10000
  flush_interval: "3s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 80000
  disk_buffer_mb: 1000
