name: carbon_black_edr
version: "1.6.0"
vendor: VMware Carbon Black
category: endpoint_security
description: Carbon Black Cloud sensor telemetry via Event Forwarder

input:
  type: kafka
  protocol: tcp
  port: 9092
  format: json

auth:
  type: api_key
  key_env: CARBONBLACK_API_KEY
  secret_env: CARBONBLACK_API_SECRET

parser:
  engine: json_path
  timestamp_field: event_timestamp
  json_paths:
    process_name: process_name
    process_pid: process_pid
    parent_name: parent_name
    command_line: process_cmdline
    hostname: device_name
    username: device_username
    sha256: process_sha256
    event_type: type

ocsf_mapping:
  event_class: 1007
  fields:
    device.hostname: hostname
    actor.user.name: username
    process.name: process_name
    process.pid: process_pid
    process.parent_process.name: parent_name
    process.cmd_line: command_line
    process.file.hashes.sha256: sha256

output:
  buffer_size: 8000
  flush_interval: "5s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 25000
  disk_buffer_mb: 600
