name: linux_auditd
version: "1.8.0"
vendor: Linux
category: endpoint_security
description: Linux audit daemon logs via audisp plugin or file tail

input:
  type: file_tail
  protocol: file
  port: 0
  format: audit_log
  file_path: /var/log/audit/audit.log

auth:
  type: none

parser:
  engine: kv_pairs
  timestamp_field: msg_timestamp
  kv_delimiter: "="
  pair_delimiter: " "

ocsf_mapping:
  event_class: 1001
  fields:
    actor.user.uid: auid
    actor.user.name: acct
    process.name: exe
    process.cmd_line: proctitle
    process.pid: pid
    device.hostname: node
    metadata.event_code: type
    file.path: name

output:
  buffer_size: 10000
  flush_interval: "5s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 30000
  disk_buffer_mb: 500
