name: trend_micro_apex
version: "1.4.0"
vendor: Trend Micro
category: endpoint_security
description: Trend Micro Apex One / Vision One detection and response logs

input:
  type: api_poll
  protocol: https
  port: 443
  format: json
  poll_interval: "15s"

auth:
  type: api_key
  key_env: TRENDMICRO_API_TOKEN

parser:
  engine: json_path
  timestamp_field: detectionTime
  json_paths:
    threat_name: malwareName
    endpoint_name: endpointName
    endpoint_ip: endpointIp
    file_path: filePath
    file_sha1: fileSha1
    action_taken: actionTaken
    risk_level: riskLevel
    detection_type: detectionType
    user: userName

ocsf_mapping:
  event_class: 1002
  fields:
    device.hostname: endpoint_name
    device.ip: endpoint_ip
    malware.name: threat_name
    file.path: file_path
    file.hashes.sha1: file_sha1
    actor.user.name: user
    metadata.product.name: "'Trend Micro Apex One'"

output:
  buffer_size: 5000
  flush_interval: "10s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 8000
  disk_buffer_mb: 400
