name: kafka_consumer
version: "1.0.0"
vendor: Apache
category: message_bus
description: Generic Apache Kafka topic consumer for event ingestion

input:
  type: kafka
  protocol: tcp
  port: 9092
  format: json

auth:
  type: sasl
  key_env: KAFKA_USERNAME
  secret_env: KAFKA_PASSWORD

parser:
  engine: json_path
  timestamp_field: timestamp

ocsf_mapping:
  event_class: 6003
  fields:
    message: payload
    metadata.log_name: topic
    metadata.product.name: "'Apache Kafka'"

output:
  buffer_size: 20000
  flush_interval: "2s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 200000
  disk_buffer_mb: 2000
