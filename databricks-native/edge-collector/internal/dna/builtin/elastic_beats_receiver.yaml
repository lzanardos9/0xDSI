name: elastic_beats_receiver
version: "1.0.0"
vendor: Elastic
category: siem_integration
description: Receive events from Elastic Beats agents (Filebeat, Winlogbeat, Metricbeat)

input:
  type: http_listener
  protocol: https
  port: 5044
  format: elastic_bulk
  tls_enabled: true

auth:
  type: api_key
  key_env: ELASTIC_INGEST_TOKEN

parser:
  engine: json_path
  timestamp_field: "@timestamp"
  json_paths:
    agent_type: agent.type
    agent_hostname: agent.hostname
    message: message
    event_module: event.module
    event_dataset: event.dataset
    log_file: log.file.path

ocsf_mapping:
  event_class: 6003
  fields:
    device.hostname: agent_hostname
    message: message
    metadata.product.name: agent_type
    metadata.log_name: event_dataset
    metadata.product.vendor_name: "'Elastic'"

output:
  buffer_size: 15000
  flush_interval: "3s"
  compression: zstd
  format: ocsf_json

health:
  heartbeat_interval: "30s"
  max_eps_warning: 100000
  disk_buffer_mb: 1500
