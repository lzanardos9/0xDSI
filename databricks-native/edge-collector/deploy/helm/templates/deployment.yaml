{{- if .Values.daemonSet.enabled }}
apiVersion: apps/v1
kind: DaemonSet
{{- else }}
apiVersion: apps/v1
kind: Deployment
{{- end }}
metadata:
  name: {{ include "collector.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "collector.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
spec:
  {{- if not .Values.daemonSet.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "collector.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "collector.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
      containers:
        - name: collector
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--dna-name={{ .Values.dna.name }}"
            - "--token=$(TOKEN)"
            - "--control-plane={{ .Values.controlPlane.url }}"
            - "--buffer-dir=/data/buffer"
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "collector.fullname" . }}-secret
                  key: token
            - name: KAFKA_BROKERS
              value: "{{ .Values.output.kafkaBrokers }}"
            - name: OUTPUT_URL
              value: "{{ .Values.output.httpURL }}"
          ports:
            - name: syslog-udp
              containerPort: {{ .Values.service.syslogUDP }}
              protocol: UDP
            - name: syslog-tcp
              containerPort: {{ .Values.service.syslogTCP }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.service.httpListener }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: buffer
              mountPath: /data/buffer
            {{- if .Values.dna.custom }}
            - name: dna-config
              mountPath: /etc/0xdsi/dna/custom.yaml
              subPath: custom.yaml
            {{- end }}
          livenessProbe:
            exec:
              command: ["0xdsi-collector", "--version"]
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["0xdsi-collector", "--version"]
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: buffer
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "collector.fullname" . }}-buffer
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- if .Values.dna.custom }}
        - name: dna-config
          configMap:
            name: {{ include "collector.fullname" . }}-dna
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
