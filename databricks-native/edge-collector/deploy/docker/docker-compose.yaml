#!/usr/bin/env bash
# docker-compose for local testing of the edge collector
set -euo pipefail

cat <<'EOF'
version: '3.8'
services:
  collector:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    container_name: 0xdsi-collector
    restart: unless-stopped
    environment:
      - TOKEN=${TOKEN:-}
      - DNA=${DNA:-generic_syslog}
      - CONTROL_PLANE_URL=${CONTROL_PLANE_URL:-}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-}
      - OUTPUT_URL=${OUTPUT_URL:-}
    command: >
      0xdsi-collector
        --dna-name=${DNA:-generic_syslog}
        --token=${TOKEN:-}
        --control-plane=${CONTROL_PLANE_URL:-}
    ports:
      - "514:514/udp"
      - "514:514/tcp"
      - "1514:1514/udp"
      - "8088:8088/tcp"
    volumes:
      - collector-buffer:/tmp/0xdsi-buffer
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "0xdsi-collector", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  collector-buffer:
EOF
