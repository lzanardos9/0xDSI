resources:
  pipelines:
    bronze_silver_gold:
      name: "[0xDSI] Medallion Pipeline - Bronze/Silver/Gold"
      target: ${var.schema}
      catalog: ${var.catalog}
      development: false
      continuous: true
      channel: "CURRENT"
      photon: true
      serverless: true
      libraries:
        - notebook:
            path: ../notebooks/pipelines/bronze_ingestion.py
        - notebook:
            path: ../notebooks/pipelines/silver_normalization.py
        - notebook:
            path: ../notebooks/pipelines/gold_analytics.py
      configuration:
        catalog: ${var.catalog}
        schema: ${var.schema}
      clusters:
        - label: "default"
          autoscale:
            min_workers: 1
            max_workers: 4
            mode: "ENHANCED"
