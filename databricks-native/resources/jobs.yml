    # ─────────────────────────────────────────────────────
    # MASTER SOC PIPELINE (Dependency-Ordered)
    # This job enforces the correct execution order for
    # the core detection→correlation→response loop.
    # ─────────────────────────────────────────────────────
    soc_core_pipeline:
      name: "[0xDSI] Master SOC Pipeline (Ordered)"
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "UTC"
      environments:
        - environment_key: default
          spec:
            dependencies:
              - scipy
              - scikit-learn
              - networkx
      tasks:
        # Stage 1: Detection (parallel)
        - task_key: behavioral_detection
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/detection/01_behavioral_anomaly_detection.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              lookback_hours: "1"

        - task_key: slm_classification
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/detection/03_detection_slm.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              batch_size: "100"
              lookback_minutes: "10"

        - task_key: formula_scoring
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/detection/04_formula_prioritization.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              lookback_minutes: "10"

        - task_key: graph_correlation_step
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/correlation/03_graph_correlation.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              lookback_hours: "1"

        - task_key: negative_correlation_step
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/correlation/02_negative_correlation.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: entity_drift_step
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/detection/05_entity_drift_cet.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              baseline_days: "30"
              recent_hours: "24"
              drift_threshold: "0.6"

        - task_key: bytecode_analysis_step
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/detection/06_bytecode_semantics.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              lookback_minutes: "10"
              anomaly_threshold: "0.7"

        - task_key: ks_recall_step
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/detection/07_ks_recall_lens.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              lookback_minutes: "10"
              similarity_threshold: "0.72"

        # Stage 2: UEO Assembly (depends on ALL detection lenses)
        - task_key: ueo_assembly
          environment_key: default
          depends_on:
            - task_key: behavioral_detection
            - task_key: slm_classification
            - task_key: formula_scoring
            - task_key: graph_correlation_step
            - task_key: negative_correlation_step
            - task_key: entity_drift_step
            - task_key: bytecode_analysis_step
            - task_key: ks_recall_step
          notebook_task:
            notebook_path: ../notebooks/correlation/09_unified_evidence_object.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              window_seconds: "300"
              lookback_minutes: "10"
              min_signals_for_ueo: "2"

        # Stage 3: Fuse Engine (Dempster-Shafer, independence, causal chains)
        - task_key: fuse_engine
          environment_key: default
          depends_on:
            - task_key: ueo_assembly
          notebook_task:
            notebook_path: ../notebooks/correlation/10_fuse_engine.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              decay_half_life_minutes: "30"
              conflict_threshold: "0.4"

        # Stage 4: Confluence Decision (reads Fuse output)
        - task_key: confluence_fusion
          environment_key: default
          depends_on:
            - task_key: fuse_engine
          notebook_task:
            notebook_path: ../notebooks/correlation/07_detection_confluence.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              fusion_window_seconds: "300"
              escalation_threshold: "0.78"

        # Stage 5: Triage (depends on Confluence)
        - task_key: triage_step
          environment_key: default
          depends_on:
            - task_key: confluence_fusion
          notebook_task:
            notebook_path: ../notebooks/agents/01_triage_agent.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              batch_size: "20"

        # Stage 6: Deduplication + Response (depends on Triage)
        - task_key: deduplication
          environment_key: default
          depends_on:
            - task_key: triage_step
          notebook_task:
            notebook_path: ../notebooks/ops/04_alert_deduplication.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              dedup_window_hours: "4"

        - task_key: automated_response_step
          environment_key: default
          depends_on:
            - task_key: deduplication
          notebook_task:
            notebook_path: ../notebooks/response/01_automated_response.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              auto_respond_threshold: "0.9"

