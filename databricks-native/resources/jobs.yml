resources:
  jobs:
    # ─────────────────────────────────────────────────────
    # INGESTION AGENTS (Streaming - Long-running)
    # These jobs run CONTINUOUSLY with restart-on-failure.
    # They use awaitTermination() internally and should
    # never terminate unless an unrecoverable error occurs.
    # ─────────────────────────────────────────────────────
    raw_event_ingestion:
      name: "[0xDSI] Agent 01 - Raw Event Ingestion (Streaming)"
      continuous:
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 86400
      environments:
        - environment_key: default
          spec:
            dependencies:
              - scipy
              - scikit-learn
              - networkx
      tasks:
        - task_key: ingest_events
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/ingestion/01_raw_event_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              source_type: "kafka"
              trigger_interval: "10 seconds"

    enrichment_pipeline:
      name: "[0xDSI] Agent 02 - Enrichment Pipeline (Streaming)"
      continuous:
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      environments:
        - environment_key: default
          spec:
            dependencies:
              - scipy
              - scikit-learn
              - networkx
      tasks:
        - task_key: enrich_events
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/ingestion/02_enrichment_pipeline.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

    # ─────────────────────────────────────────────────────
    # CORRELATION AGENTS (Streaming + Scheduled)
    # Streaming correlation runs continuously alongside
    # ingestion. Batch correlators run on short intervals.
    # ─────────────────────────────────────────────────────
    streaming_correlation:
      name: "[0xDSI] Agent 05 - Streaming Correlation Engine (Continuous)"
      continuous:
        pause_status: UNPAUSED
      max_concurrent_runs: 1
      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 86400
      environments:
        - environment_key: default
          spec:
            dependencies:
              - scipy
              - scikit-learn
              - networkx
      tasks:
        - task_key: correlate_events
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/correlation/01_streaming_correlation_engine.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

