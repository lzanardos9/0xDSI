    # INGESTION AGENTS (Streaming - Long-running)
    # ─────────────────────────────────────────────────────
    raw_event_ingestion:
      name: "[0xDSI] Agent 01 - Raw Event Ingestion"
      schedule:
        quartz_cron_expression: "0 0 0 * * ?"
        timezone_id: "UTC"
      environments:
        - environment_key: default
          spec:
            client: "1"
      tasks:
        - task_key: ingest_events
          environment_key: default
          notebook_task:
            notebook_path: ../notebooks/ingestion/01_raw_event_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              source_type: "kafka"

