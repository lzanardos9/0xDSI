resources:
  apps:
    oxdsi_soc:
      name: "0xdsi-agentic-soc"
      description: "0xDSI Agentic SOC Platform - Real-time security operations center"
      source_code_path: ../app
      config:
        command:
          - python
          - -m
          - uvicorn
          - backend.server:app
          - --host
          - "0.0.0.0"
          - --port
          - "${DATABRICKS_APP_PORT}"
        env:
          - name: DATABRICKS_WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: UNITY_CATALOG
            value: ${var.catalog}
          - name: UNITY_SCHEMA
            value: ${var.schema}
          - name: LLM_ENDPOINT
            value: ${var.llm_endpoint}
          - name: LLM_FALLBACK_ENDPOINT
            value: ${var.llm_fallback_endpoint}
          - name: EMBEDDING_ENDPOINT
            value: ${var.embedding_endpoint}
      permissions:
        - level: CAN_MANAGE
          group_name: "soc_admins"
        - level: CAN_USE
          group_name: "soc_analysts"

  # Interactive Agent Model Serving Endpoints
  model_serving_endpoints:
    ciso_assistant:
      name: "0xdsi-ciso-assistant"
      config:
        served_entities:
          - entity_name: "${var.catalog}.${var.schema}.0xdsi_ciso_assistant"
            entity_version: "1"
            workload_size: "Small"
            scale_to_zero_enabled: true
        auto_capture_config:
          catalog_name: ${var.catalog}
          schema_name: ${var.schema}
          table_name_prefix: "ciso_assistant_inference"

    sage_enrichment:
      name: "0xdsi-sage-enrichment"
      config:
        served_entities:
          - entity_name: "${var.catalog}.${var.schema}.0xdsi_sage_enrichment"
            entity_version: "1"
            workload_size: "Small"
            scale_to_zero_enabled: true

    nova_investigation:
      name: "0xdsi-nova-investigation"
      config:
        served_entities:
          - entity_name: "${var.catalog}.${var.schema}.0xdsi_nova_investigation"
            entity_version: "1"
            workload_size: "Small"
            scale_to_zero_enabled: true

    vanguard_response:
      name: "0xdsi-vanguard-response"
      config:
        served_entities:
          - entity_name: "${var.catalog}.${var.schema}.0xdsi_vanguard_response"
            entity_version: "1"
            workload_size: "Small"
            scale_to_zero_enabled: true

    threat_simulator:
      name: "0xdsi-threat-simulator"
      config:
        served_entities:
          - entity_name: "${var.catalog}.${var.schema}.0xdsi_threat_simulator"
            entity_version: "1"
            workload_size: "Small"
            scale_to_zero_enabled: true

    threat_radar:
      name: "0xdsi-threat-radar"
      config:
        served_entities:
          - entity_name: "${var.catalog}.${var.schema}.0xdsi_threat_radar"
            entity_version: "1"
            workload_size: "Small"
            scale_to_zero_enabled: true
