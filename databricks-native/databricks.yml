bundle:
  name: 0xdsi-agentic-soc

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

variables:
  catalog:
    default: soc_platform
  schema:
    default: agentic_soc
  warehouse_id:
    description: "Serverless SQL Warehouse ID for the app backend"
  llm_endpoint:
    default: databricks-meta-llama-3-1-70b-instruct
    description: "Primary Foundation Model endpoint for all agents"
  llm_fallback_endpoint:
    default: databricks-meta-llama-3-1-8b-instruct
    description: "Fallback model when primary is unavailable"
  embedding_endpoint:
    default: databricks-bge-large-en
    description: "Embedding model for vector search and memory"
  secret_scope:
    default: soc-secrets
    description: "Databricks secret scope for API keys"

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: soc_platform_dev
      schema: agentic_soc

  staging:
    variables:
      catalog: soc_platform_staging
      schema: agentic_soc

  production:
    mode: production
    variables:
      catalog: soc_platform
      schema: agentic_soc

include:
  - resources/*.yml
