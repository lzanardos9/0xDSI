command:
  - python
  - -m
  - uvicorn
  - backend.server:app
  - --host
  - "0.0.0.0"
  - --port
  - "${DATABRICKS_APP_PORT:-8000}"

env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: ""
  - name: UNITY_CATALOG
    value: soc_platform
  - name: UNITY_SCHEMA
    value: agentic_soc
  - name: LLM_ENDPOINT
    value: databricks-meta-llama-3-1-70b-instruct
  - name: LLM_FALLBACK_ENDPOINT
    value: databricks-meta-llama-3-1-8b-instruct
  - name: EMBEDDING_ENDPOINT
    value: databricks-bge-large-en
