command: ["npm", "start"]

env:
  - name: NODE_ENV
    value: production
  - name: VITE_SUPABASE_URL
    valueFrom:
      secretKeyRef:
        name: supabase-credentials
        key: url
  - name: VITE_SUPABASE_ANON_KEY
    valueFrom:
      secretKeyRef:
        name: supabase-credentials
        key: anon_key
